{% load static %}

<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Squeeb — Forgot Password</title>

    <!-- Bootstrap -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet"
          href="{% static 'accounts/css/forgot_password.css' %}">
</head>

<body>

<main class="login-page">

    <div class="login-wrapper container d-flex align-items-center justify-content-center">

        <div class="login-card shadow-sm">

            <!-- Logo -->
            <div class="brand text-center">

                <a href="{% url 'home' %}" class="logo">
                    <img src="{% static 'accounts/img/logo.png' %}"
                         alt="Squeeb Logo">
                </a>

            </div>

            <!-- Heading -->
            <h1 class="text-center">
                Forgot Password?
            </h1>

            <p class="text-center text-muted description">
                Enter your email address and we'll send you a password reset link.
            </p>

            <!-- Form -->
            <form method="post" class="px-4">

                {% csrf_token %}

                <div class="form-group">

                    <div class="input-group">

                        <div class="input-group-prepend">
                            <span class="input-group-text bg-transparent border-right-0">
                                <i class="fa fa-envelope"></i>
                            </span>
                        </div>

                        <input
                            type="email"
                            name="email"
                            class="form-control border-left-0"
                            placeholder="Email address"
                            required>

                    </div>

                </div>

                <button
                    type="submit"
                    class="btn btn-primary btn-block">

                    SEND RESET LINK

                </button>

            </form>

            <div class="form-footer text-center">

                <a href="{% url 'login' %}">
                    Back to Login
                </a>

            </div>

        </div>

    </div>

</main>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
