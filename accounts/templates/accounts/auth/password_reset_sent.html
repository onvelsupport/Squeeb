{% load static %}

<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Squeeb — Reset Email Sent</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="{% static 'accounts/css/password_reset.css' %}">
</head>

<body>

<main class="reset-page">

    <div class="reset-card">

        <div class="brand">
            <a href="{% url 'home' %}">
                <img src="{% static 'accounts/img/logo.png' %}" alt="Squeeb Logo">
            </a>
        </div>

        <h1>Check Your Email</h1>

        <p>
            If an account exists with that email address, we have sent a password reset link.
        </p>

        <p>
            Please check your inbox and spam folder.
        </p>

        <div class="reset-footer">
            <a href="{% url 'login' %}">Back to Login</a>
        </div>

    </div>

</main>

</body>
</html>
