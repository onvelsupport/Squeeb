{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Squeeb | Sign Up</title>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet"
          href="{% static 'accounts/css/signup.css' %}">
</head>

<body>

<div class="signup-page">

    <div class="signup-card">

        <a href="{% url 'home' %}" class="logo">
            <img src="{% static 'accounts/img/logo.png' %}" alt="Squeeb logo">
        </a>

        <div class="heading">
            <h1>Create account</h1>
            <p>Start using Squeeb in less than a minute.</p>
        </div>

        <form id="signupForm">

            <div class="form-row">

                <div class="form-group">
                    <label for="username">Username</label>

                    <div class="input-box">
                        <input
                            type="text"
                            id="username"
                            name="username"
                            placeholder="Username"
                            required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>

                    <div class="input-box">
                        <input
                            type="email"
                            id="email"
                            name="email"
                            placeholder="Email address"
                            required>
                    </div>
                </div>

            </div>

            <div class="form-group">
                <label for="password">Password</label>

                <div class="input-box password-box">
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Password"
                        required>

                    <button
                        type="button"
                        class="password-toggle"
                        id="pwToggle"
                        aria-label="Show password">
                        <i class="fa-regular fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>

                <div class="input-box password-box">
                    <input
                        type="password"
                        id="confirmPassword"
                        name="confirmPassword"
                        placeholder="Confirm password"
                        required>

                    <button
                        type="button"
                        class="password-toggle"
                        id="pwToggle2"
                        aria-label="Show password">
                        <i class="fa-regular fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="form-group">
                <label for="referral">
                    Referral Code <span>(optional)</span>
                </label>

                <div class="input-box">
                    <input
                        type="text"
                        id="referral"
                        name="referral"
                        placeholder="Referral code">
                </div>
            </div>

            <button type="submit" class="signup-btn">
                Create account
            </button>

        </form>

        <div class="bottom-text">
            Already have an account?
            <a href="{% url 'login' %}">Log in</a>
        </div>

    </div>

</div>

<script src="{% static 'accounts/js/signup.js' %}"></script>

</body>
</html>
